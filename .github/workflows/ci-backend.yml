name: CI Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"
      - ".globalconfig"
      - ".editorconfig"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"
      - ".globalconfig"
      - ".editorconfig"

defaults:
  run:
    working-directory: backend

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore LegalAiAr.sln

      - name: Build
        run: dotnet build LegalAiAr.sln --no-restore -c Release

      - name: Test
        run: dotnet test LegalAiAr.sln -c Release --no-build --logger trx --collect:"XPlat Code Coverage"

      - name: Lint (format verify)
        run: dotnet format LegalAiAr.sln --verify-no-changes --verbosity diagnostic

      - name: Publish Coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: backend/tests
          fail_ci_if_error: false

      - name: Publish API
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: dotnet publish src/api/LegalAiAr.Api/LegalAiAr.Api.csproj -c Release -o ./publish

      - name: Upload Artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ github.sha }}
          path: backend/publish/
