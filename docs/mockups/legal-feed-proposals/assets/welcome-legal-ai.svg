<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="280" height="260" viewBox="0 0 280 260">
  <!-- Blob fondo suave -->
  <path d="M0 180 Q70 220 120 200 Q180 180 200 240 L0 260 Z" fill="#f5e6dc" opacity="0.9"/>
  <path d="M200 60 Q260 40 280 100 Q280 160 220 180 L280 260 L200 260 Z" fill="#f0d5c8" opacity="0.7"/>
  <!-- Monitor/pantalla -->
  <rect x="60" y="40" width="160" height="110" rx="4" fill="#e8e4e0" stroke="#d1d1d1" stroke-width="1"/>
  <rect x="65" y="45" width="150" height="100" rx="2" fill="#f5e9a8"/>
  <!-- Contenido pantalla: balanza de la justicia + documento -->
  <g transform="translate(95, 55)">
    <!-- Balanza simplificada -->
    <line x1="45" y1="15" x2="45" y2="55" stroke="#474747" stroke-width="2" stroke-linecap="round"/>
    <line x1="25" y1="25" x2="65" y2="25" stroke="#474747" stroke-width="2" stroke-linecap="round"/>
    <circle cx="45" cy="15" r="4" fill="#D04A02"/>
    <circle cx="25" cy="25" r="6" fill="#696969"/>
    <circle cx="65" cy="25" r="6" fill="#696969"/>
    <line x1="25" y1="25" x2="25" y2="45" stroke="#474747" stroke-width="1.5"/>
    <line x1="65" y1="25" x2="65" y2="45" stroke="#474747" stroke-width="1.5"/>
    <!-- Documento -->
    <rect x="5" y="50" width="35" height="45" rx="2" fill="#fff" stroke="#d1d1d1" stroke-width="1"/>
    <line x1="12" y1="60" x2="33" y2="60" stroke="#696969" stroke-width="1"/>
    <line x1="12" y1="68" x2="28" y2="68" stroke="#696969" stroke-width="1"/>
    <line x1="12" y1="76" x2="33" y2="76" stroke="#696969" stroke-width="1"/>
  </g>
  <!-- Base del monitor -->
  <rect x="115" y="148" width="50" height="6" rx="1" fill="#d1d1d1"/>
  <rect x="105" y="154" width="70" height="8" rx="2" fill="#e8e4e0"/>
  <!-- Burbuja de chat (AI) -->
  <path d="M30 100 L30 140 Q30 155 50 155 L75 155 L85 165 L95 155 L120 155 Q140 155 140 140 L140 100 Q140 85 120 85 L50 85 Q30 85 30 100 Z" fill="#fff" stroke="#e8e8e8" stroke-width="1.5"/>
  <!-- Puntos de typing en la burbuja -->
  <circle cx="55" cy="120" r="4" fill="#D04A02"/>
  <circle cx="75" cy="120" r="4" fill="#D04A02"/>
  <circle cx="95" cy="120" r="4" fill="#D04A02"/>
  <!-- Circulo suave detras del chat -->
  <circle cx="85" cy="120" r="50" fill="#fff0eb" opacity="0.5"/>
</svg>
