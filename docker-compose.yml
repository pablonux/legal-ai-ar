# Legal AI AR — Desarrollo local
# Levanta SQL Server para desarrollo. Neo4j incluido para Fase 3 (grafo).
# Azure Blob, AI Search y Azure OpenAI se usan directamente desde Azure.

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Dev_Password123!"
    ports:
      - "1433:1433"

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: "neo4j/dev_password"
    ports:
      - "7474:7474"
      - "7687:7687"
    profiles:
      - neo4j
