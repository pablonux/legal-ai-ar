# Multiple apps and images are supported, each will have its own independent knativeService and virtualService
apps:
- name: backend
  ingress: enabled
  image:
    build: true
    name: legal-ai-api
    path: ./backend
    port: 8080
    repository: default
    experimentalBuild: true
    tag: default
    languages:
    - dotnet
  rewrite:
    uri: /
  resources:
    requests:
      cpu: 250m
      memory: 250M
    limits:
      cpu: 2000m
      memory: 2Gi
- name: frontend
  ingress: enabled
  minScale: 1
  image:
    build: true
    name: legal-ai-ui
    path: ./frontend
    port: 8081
    repository: default
    experimentalBuild: true
    tag: default
    languages:
    - angular
  rewrite:
    uri: /
  resources:
    requests:
      cpu: 250m
      memory: 250M
    limits:
      cpu: 500m
      memory: 500M
